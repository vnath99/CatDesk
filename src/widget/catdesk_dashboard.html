<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CatDesk Review</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #212121;
        --panel: #383838;
        --panel-2: #414141;
        --line: #414141;
        --text: #ffffff;
        --text-2: #cdcdcd;
        --text-3: #afafaf;
        --muted: #afafaf;
        --text-inverted: #fafafa;
        --accent: #0285ff;
        --ok: #40c977;
        --warn: #ff9e6c;
        --err: #ff8583;
        --chip: #383838;
        --code: #212121;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 12px;
        color: var(--text);
        background: var(--bg);
        font:
          13px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
      }

      .root {
        display: grid;
        gap: 8px;
        border-radius: 10px;
        background: var(--bg);
        padding: 10px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .title {
        margin: 0;
        font-size: 14px;
        color: var(--text);
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .state {
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
        color: var(--muted);
        text-transform: lowercase;
        white-space: nowrap;
      }

      .state.done,
      .state.success {
        color: var(--ok);
      }
      .state.waiting,
      .state.pending {
        color: var(--warn);
      }
      .state.failed,
      .state.error {
        color: var(--err);
      }

      .section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .section h2 {
        margin: 0;
        padding: 7px 10px;
        border-bottom: 1px solid var(--line);
        color: var(--text-2);
        font-size: 12px;
        text-transform: none;
        letter-spacing: 0;
      }

      .section-body {
        padding: 4px 0;
      }

      .files {
        display: block;
      }

      details.file {
        border: 0;
        border-top: 1px solid var(--line);
        background: transparent;
      }

      details.file:first-child {
        border-top: 0;
      }

      .file-static {
        border: 0;
        border-top: 1px solid var(--line);
        background: transparent;
      }

      .file-static:first-child {
        border-top: 0;
      }

      details.file > summary,
      .file-static-summary {
        list-style: none;
        padding: 9px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      details.file > summary {
        cursor: pointer;
      }

      details.file > summary::-webkit-details-marker {
        display: none;
      }
      details.file[open] > summary {
        border-bottom: 1px solid var(--line);
      }

      .file-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        color: var(--text);
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--muted);
        flex: 0 0 auto;
      }

      .dot.modified {
        background: var(--warn);
      }
      .dot.added,
      .dot.untracked,
      .dot.copied,
      .dot.success {
        background: var(--ok);
      }
      .dot.deleted,
      .dot.error,
      .dot.conflict {
        background: var(--err);
      }
      .dot.renamed,
      .dot.clean,
      .dot.truncated {
        background: var(--accent);
      }

      .path {
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-meta {
        display: inline-flex;
        align-items: baseline;
        gap: 10px;
        color: var(--muted);
        white-space: nowrap;
        font-size: 11px;
        letter-spacing: 0.1px;
      }

      .status-label {
        color: var(--text-3);
        text-transform: lowercase;
      }

      .counts {
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
        font-variant-numeric: tabular-nums;
      }

      .counts .plus {
        color: var(--ok);
      }

      .counts .minus {
        color: var(--err);
      }

      .diff-wrap {
        padding: 8px 12px 10px;
      }

      .dir-summary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0;
        color: var(--text-2);
        font-size: 12px;
      }

      .dir-summary .listing-kind {
        color: var(--text-2);
      }

      .diff {
        border: 0;
        border-radius: 0;
        background: var(--bg);
        max-height: 230px;
        overflow: auto;
      }

      .dline {
        display: grid;
        grid-template-columns: 14px 46px 1fr;
        align-items: baseline;
        column-gap: 6px;
        padding: 1px 8px;
        color: var(--text-2);
        font:
          12px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        white-space: pre;
      }

      .dline.hdr {
        color: var(--text-3);
        background: var(--panel);
      }
      .dline.add {
        color: var(--text);
        background: rgba(64, 201, 119, 0.14);
      }
      .dline.del {
        color: var(--text);
        background: rgba(255, 133, 131, 0.14);
      }

      .ln {
        text-align: right;
        color: var(--text-3);
        user-select: none;
      }

      .op {
        text-align: center;
        color: var(--text-3);
        user-select: none;
      }

      .dline.add .op {
        color: var(--ok);
      }
      .dline.del .op {
        color: var(--err);
      }

      .code {
        overflow-x: auto;
      }

      .empty {
        color: var(--muted);
        font-style: italic;
      }

      .loading {
        padding: 18px 12px;
      }

      .command-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        padding: 10px 12px;
      }

      .detail-panel {
        display: grid;
        gap: 8px;
        padding: 8px 12px 10px;
      }

      .command-card {
        border: 0;
        background: transparent;
      }

      .command-card > summary {
        list-style: none;
        cursor: pointer;
      }

      .command-card > summary::-webkit-details-marker {
        display: none;
      }

      .command-card[open] > summary {
        border-bottom: 1px solid var(--line);
      }

      .command-target {
        display: flex;
        align-items: center;
        flex: 1 1 auto;
        min-width: 0;
        gap: 7px;
        color: var(--text-2);
        font-size: 12px;
        white-space: nowrap;
      }

      .command-icon {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
        color: var(--text-3);
      }

      .command-icon svg {
        width: 15px;
        height: 15px;
        display: block;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .command-label {
        color: var(--text-3);
        flex: 0 0 auto;
      }

      .command-value {
        display: block;
        min-width: 0;
        flex: 0 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font-weight: 650;
      }

      .command-meta {
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
        color: var(--text-3);
        font-size: 11px;
        white-space: nowrap;
      }

      .read-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        padding: 10px 12px;
      }

      .change-card {
        border: 0;
        background: transparent;
      }

      .change-card > summary {
        list-style: none;
        cursor: pointer;
      }

      .change-card > summary::-webkit-details-marker {
        display: none;
      }

      .change-card[open] > summary {
        border-bottom: 1px solid var(--line);
      }

      .change-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        padding: 10px 12px;
      }

      .read-target,
      .change-target {
        display: inline-flex;
        align-items: center;
        flex: 1 1 auto;
        max-width: 100%;
        min-width: 0;
        gap: 8px;
        color: var(--text-2);
        font-size: 12px;
      }

      .read-icon,
      .change-icon {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
        color: var(--text-3);
      }

      .read-icon svg,
      .change-icon svg {
        width: 15px;
        height: 15px;
        display: block;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .read-label,
      .change-label {
        color: var(--text-3);
      }

      .read-name-wrap,
      .change-name-wrap {
        position: relative;
        display: inline-flex;
        min-width: 0;
        max-width: 100%;
      }

      .read-name,
      .change-name {
        display: inline-block;
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font-weight: 650;
        outline: none;
      }

      .read-name-full,
      .change-name-full {
        display: none;
      }

      .read-name-wrap:hover .read-name-short,
      .read-name-wrap:focus-within .read-name-short,
      .change-name-wrap:hover .change-name-short,
      .change-name-wrap:focus-within .change-name-short {
        display: none;
      }

      .read-name-wrap:hover .read-name-full,
      .read-name-wrap:focus-within .read-name-full,
      .change-name-wrap:hover .change-name-full,
      .change-name-wrap:focus-within .change-name-full {
        display: inline-block;
      }

      .read-meta,
      .change-meta {
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
        gap: 10px;
        color: var(--text-3);
        font-size: 11px;
        white-space: nowrap;
      }

      .read-meta-item,
      .change-meta-item {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }


      .command-output {
        margin: 0;
        border: 0;
        border-radius: 0;
        background: var(--bg);
        max-height: 260px;
        overflow: auto;
        padding: 8px;
        color: var(--text-2);
        font:
          12px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .command-line {
        color: var(--text);
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .search-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        min-width: 0;
        padding: 10px 12px;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .panel-head.kicker-only {
        justify-content: flex-end;
      }

      .panel-title {
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: lowercase;
      }

      .panel-kicker {
        color: var(--text-3);
        font-size: 11px;
        text-transform: lowercase;
        white-space: nowrap;
      }

      .summary-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }

      .summary-row.metrics {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 1px;
      }

      .summary-row.with-kicker .summary-stat.path {
        flex: 1 1 auto;
        min-width: 0;
      }

      .summary-kicker {
        margin-left: auto;
        flex: 0 0 auto;
      }

      .summary-stat {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        color: var(--text-2);
      }

      .summary-stat.query {
        color: var(--text);
      }

      .summary-stat.path {
        max-width: 100%;
      }

      .summary-stat.other {
        color: var(--text-3);
      }

      .summary-stat svg {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        display: block;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .summary-value {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .search-target {
        display: flex;
        align-items: center;
        width: 100%;
        min-width: 0;
        gap: 7px;
        color: var(--text-2);
        font-size: 12px;
        white-space: nowrap;
      }

      .search-icon {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
        color: var(--text-3);
      }

      .search-icon svg {
        width: 15px;
        height: 15px;
        display: block;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .search-label,
      .search-backend {
        color: var(--text-3);
        flex: 0 0 auto;
      }

      .search-value {
        display: block;
        min-width: 0;
        max-width: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font-weight: 650;
      }

      .search-pattern {
        flex: 0 1 auto;
        min-width: 0;
      }

      .search-path {
        flex: 0 1 auto;
        min-width: 0;
        max-width: min(24ch, 28vw);
      }

      .search-meta {
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
        color: var(--text-3);
        font-size: 11px;
        white-space: nowrap;
      }

      .search-note {
        color: var(--text-3);
        font-size: 11px;
      }

      .listing-panel {
        display: grid;
        gap: 8px;
        padding: 8px 12px 10px;
      }

      .listing-summary {
        display: grid;
        gap: 6px;
        color: var(--text-2);
        font-size: 12px;
      }

      .listing-results {
        border: 0;
        border-radius: 0;
        background: var(--bg);
        max-height: 260px;
        overflow: auto;
      }

      .listing-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-top: 1px solid var(--line);
        min-width: 0;
      }

      .listing-row:first-child {
        border-top: 0;
      }

      .listing-row.other .listing-kind {
        color: var(--text-3);
      }

      .listing-kind {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-2);
      }

      .listing-kind svg {
        width: 14px;
        height: 14px;
        display: block;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .summary-stat svg.is-folder-icon,
      .listing-kind svg.is-folder-icon {
        stroke-width: 2;
      }

      .listing-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
      }

      .listing-note {
        color: var(--text-3);
        font-size: 11px;
      }

      .instruction-panel {
        display: grid;
        gap: 12px;
        padding: 10px 12px 12px;
      }

      .instruction-paths {
        display: grid;
        gap: 8px;
      }

      .instruction-path-stat {
        width: 100%;
        display: grid;
        grid-template-columns: 14px 74px minmax(0, 1fr);
        align-items: center;
        column-gap: 6px;
      }

      .instruction-path-stat.has-action {
        grid-template-columns: 14px 74px auto;
        justify-content: start;
      }

      .instruction-path-label {
        color: var(--text-3);
        font-size: 11px;
        line-height: 1.2;
        text-align: left;
        white-space: nowrap;
      }

      .instruction-path-code {
        min-width: 0;
        width: fit-content;
        max-width: min(100%, 440px);
        justify-self: start;
        display: inline-flex;
        align-items: center;
        height: 26px;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--bg);
        color: var(--text-2);
        font:
          11px/1.35 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        white-space: nowrap;
      }

      .instruction-path-combo {
        min-width: 0;
        display: inline-flex;
        align-items: stretch;
        justify-self: start;
        height: 26px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--bg);
        overflow: hidden;
      }

      .instruction-path-combo.has-popout {
        position: relative;
        overflow: visible;
      }

      .instruction-path-combo .instruction-path-code {
        border: 0;
        border-radius: 0;
        background: transparent;
        padding-right: 8px;
      }

      .instruction-path-combo.has-popout .instruction-path-code {
        border-top-left-radius: 12px;
        border-bottom-left-radius: 12px;
      }

      .instruction-path-action {
        width: 30px;
        height: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 0;
        border-left: 1px solid var(--line);
        background: transparent;
        color: var(--text-2);
        cursor: pointer;
      }

      .instruction-path-combo.has-popout .instruction-path-action {
        width: 32px;
        border-top-right-radius: 12px;
        border-bottom-right-radius: 12px;
      }

      .instruction-path-action svg {
        width: 15px;
        height: 15px;
        display: block;
        stroke: none !important;
        fill: currentColor !important;
      }

      .instruction-path-action:hover,
      .instruction-path-action:focus-visible {
        background: var(--panel-2);
        color: var(--text);
        outline: none;
      }

      .instruction-path-trailing {
        display: inline-flex;
        align-items: center;
        gap: 0;
        justify-self: start;
      }

      .agents-fan-root {
        position: relative;
        display: inline-flex;
        flex: 0 0 auto;
        z-index: 1;
      }

      .agents-fan-root.is-open {
        z-index: 12;
      }

      .agents-fan-trigger.is-open {
        background: var(--panel-2);
        color: var(--text);
      }

      .agents-fan-menu {
        position: fixed;
        left: 0;
        top: 0;
        width: 124px;
        height: 176px;
        transform: translateY(-50%);
        transform-origin: 24px 88px;
        opacity: 0;
        transition: opacity 120ms ease;
        z-index: 48;
        filter: drop-shadow(0 18px 26px rgba(0, 0, 0, 0.28));
        pointer-events: none;
      }

      .agents-fan-root.is-open .agents-fan-menu {
        opacity: 1;
        transform: translateY(-50%);
        transition: opacity 180ms ease;
      }

      .summary-stat .agents-fan-svg {
        width: 124px;
        height: 176px;
        display: block;
        flex: none;
        overflow: visible;
        pointer-events: none;
      }

      .agents-fan-hint {
        position: fixed;
        display: none;
        left: 0;
        top: 0;
        min-width: 118px;
        max-width: none;
        padding: 7px 9px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: rgba(26, 26, 28, 0.96);
        box-shadow: 0 14px 24px rgba(0, 0, 0, 0.28);
        color: var(--text-2);
        font-size: 11px;
        line-height: 1.35;
        white-space: nowrap;
        opacity: 0;
        transform: translate(8px, -50%) scale(0.96);
        transform-origin: left center;
        transition:
          opacity 120ms ease,
          transform 160ms cubic-bezier(0.2, 0.78, 0.25, 1),
          top 160ms ease;
        pointer-events: none;
        z-index: 49;
      }

      .agents-fan-hint::before {
        content: "";
        position: absolute;
        left: -5px;
        top: 50%;
        width: 10px;
        height: 10px;
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(26, 26, 28, 0.96);
        transform: translateY(-50%) rotate(45deg);
      }

      .agents-fan-hint.is-visible {
        display: block;
        opacity: 1;
        transform: translate(0, -50%) scale(1);
      }

      @keyframes g6-pointer-lock {
        0%,
        99% {
          pointer-events: none;
        }

        100% {
          pointer-events: all;
        }
      }

      .agents-fan-sector-group {
        cursor: pointer;
        pointer-events: none;
        outline: none;
        transform-origin: 24px 88px;
        transform-box: view-box;
        transform: translate(var(--start-x), var(--start-y)) scale(0.1);
        opacity: 0;
        transition:
          opacity 100ms ease,
          transform 120ms ease-in;
      }

      .agents-fan-sector-group.is-disabled {
        cursor: not-allowed;
      }

      .agents-fan-root.is-open .agents-fan-sector-group {
        opacity: 1;
        transform: translate(var(--end-x), var(--end-y)) scale(1);
        transition:
          opacity 100ms ease,
          transform 350ms cubic-bezier(0.175, 0.885, 0.32, 1.25);
        transition-delay: calc(var(--fan-delay) * 2.5);
        animation: g6-pointer-lock calc(var(--fan-delay) * 2.5 + 350ms)
          forwards;
      }

      .agents-fan-sector {
        fill: rgba(33, 33, 33, 0.94);
        stroke: var(--line);
        stroke-width: 1;
        transform-origin: center;
        transform-box: fill-box;
        transition: fill 140ms ease, stroke 140ms ease;
      }

      .agents-fan-sector-shadow {
        fill: rgba(0, 0, 0, 0.18);
        stroke: none;
        display: none;
      }

      .agents-fan-sector-group .agents-fan-icon {
        color: var(--text-2);
        opacity: 0;
        transition: color 140ms ease, opacity 80ms ease;
      }

      .agents-fan-root.is-open .agents-fan-sector-group .agents-fan-icon {
        opacity: 1;
        transition: color 140ms ease, opacity 100ms ease;
        transition-delay: calc(var(--fan-delay) * 2.5);
      }

      .agents-fan-sector-group .agents-fan-icon path,
      .agents-fan-sector-group .agents-fan-icon polyline,
      .agents-fan-sector-group .agents-fan-icon line,
      .agents-fan-sector-group .agents-fan-icon rect,
      .agents-fan-sector-group .agents-fan-icon circle {
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .agents-fan-sector-group .agents-fan-icon .agents-fan-fill {
        stroke: none;
        fill: currentColor;
      }

      .agents-fan-sector-group .agents-fan-icon.is-folder-icon path,
      .agents-fan-sector-group .agents-fan-icon .is-folder-icon path {
        stroke-width: 2;
      }

      .agents-fan-sector-group.is-disabled .agents-fan-icon {
        color: var(--text-3);
      }

      .agents-fan-sector-group.is-disabled .agents-fan-sector {
        fill: rgba(255, 255, 255, 0.015);
        stroke: rgba(255, 255, 255, 0.08);
      }

      .agents-fan-sector-group.is-selected .agents-fan-sector {
        fill: rgba(255, 255, 255, 0.1);
        stroke: rgba(255, 255, 255, 0.3);
      }

      .agents-fan-sector-group.is-selected .agents-fan-icon {
        color: var(--text);
      }

      .agents-fan-sector-group:not(.is-disabled):hover .agents-fan-sector,
      .agents-fan-sector-group:not(.is-disabled):focus-visible .agents-fan-sector {
        fill: rgba(255, 255, 255, 0.14);
        stroke: rgba(255, 255, 255, 0.42);
        stroke-width: 1.5px;
      }

      .agents-fan-sector-group.is-selected:not(.is-disabled):hover .agents-fan-sector,
      .agents-fan-sector-group.is-selected:not(.is-disabled):focus-visible .agents-fan-sector {
        fill: rgba(255, 255, 255, 0.14);
        stroke: rgba(255, 255, 255, 0.42);
        stroke-width: 1.5px;
      }

      .agents-fan-sector-group:not(.is-disabled):hover,
      .agents-fan-sector-group:not(.is-disabled):focus-visible {
        transform: translate(var(--hover-x), var(--hover-y)) scale(1.02) !important;
        transition: transform 150ms cubic-bezier(0.2, 0.8, 0.2, 1) !important;
        transition-delay: 0ms !important;
      }

      .agents-fan-sector-group:not(.is-disabled):hover .agents-fan-icon,
      .agents-fan-sector-group:not(.is-disabled):focus-visible .agents-fan-icon {
        color: #ffffff;
      }

      .agents-fan-guide {
        fill: none;
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 1;
        stroke-dasharray: 2 4;
        display: none;
      }

      .agents-fan-sector-group[data-agents-option="default"] {
        --fan-delay: 0ms;
        --start-x: -9px;
        --start-y: 39px;
        --end-x: 1.1px;
        --end-y: -4.9px;
        --hover-x: 2.7px;
        --hover-y: -11.7px;
      }

      .agents-fan-sector-group[data-agents-option="disabled"] {
        --fan-delay: 22ms;
        --start-x: -31.3px;
        --start-y: 24.9px;
        --end-x: 3.9px;
        --end-y: -3.1px;
        --hover-x: 9.4px;
        --hover-y: -7.4px;
      }

      .agents-fan-sector-group[data-agents-option="workspace"] {
        --fan-delay: 44ms;
        --start-x: -40px;
        --start-y: 0px;
        --end-x: 5px;
        --end-y: 0px;
        --hover-x: 12px;
        --hover-y: 0px;
      }

      .agents-fan-sector-group[data-agents-option="catdesk"] {
        --fan-delay: 66ms;
        --start-x: -31.3px;
        --start-y: -24.9px;
        --end-x: 3.9px;
        --end-y: 3.1px;
        --hover-x: 9.4px;
        --hover-y: 7.4px;
      }

      .agents-fan-sector-group[data-token-layout-option="disable"],
      .agents-fan-sector-group[data-show-detail-option="disable"] {
        --fan-delay: 0ms;
        --start-x: -31.3px;
        --start-y: 24.9px;
        --end-x: 3.9px;
        --end-y: -3.1px;
        --hover-x: 9.4px;
        --hover-y: -7.4px;
      }

      .agents-fan-sector-group[data-token-layout-option="right"],
      .agents-fan-sector-group[data-show-detail-option="expanded"] {
        --fan-delay: 24ms;
        --start-x: -40px;
        --start-y: 0px;
        --end-x: 5px;
        --end-y: 0px;
        --hover-x: 12px;
        --hover-y: 0px;
      }

      .agents-fan-sector-group[data-token-layout-option="bottom"],
      .agents-fan-sector-group[data-show-detail-option="collapsed"] {
        --fan-delay: 48ms;
        --start-x: -31.3px;
        --start-y: -24.9px;
        --end-x: 3.9px;
        --end-y: 3.1px;
        --hover-x: 9.4px;
        --hover-y: 7.4px;
      }

      .agents-fan-sector-group[data-agents-option="codex"] {
        --fan-delay: 88ms;
        --start-x: -9px;
        --start-y: -39px;
        --end-x: 1.1px;
        --end-y: 4.9px;
        --hover-x: 2.7px;
        --hover-y: 11.7px;
      }

      .section.is-instruction-popout {
        position: relative;
        overflow: visible;
        z-index: 2;
      }

      .section.is-instruction-popout .section-body,
      .section.is-instruction-popout .instruction-panel {
        overflow: visible;
      }

      .section.is-instruction-popout .instruction-panel {
        padding-top: 26px;
        padding-bottom: 26px;
      }

      .binagotchy-modal-root {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(12, 12, 14, 0.58);
        backdrop-filter: blur(3px);
      }

      .binagotchy-modal-root.is-open {
        display: flex;
      }

      .binagotchy-modal {
        position: relative;
        width: min(100%, 900px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: linear-gradient(180deg, #353332 0%, #2f2d2c 100%);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
        overflow: hidden;
      }

      .binagotchy-modal-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto auto;
        align-items: center;
        gap: 10px;
        padding: 12px 14px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(0, 0, 0, 0.08);
      }

      .binagotchy-modal-title {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-2);
        letter-spacing: 0;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .binagotchy-modal-count {
        color: var(--text-3);
        font-size: 11px;
        white-space: nowrap;
      }

      .binagotchy-modal-reset,
      .binagotchy-modal-close {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--bg);
        color: var(--text-3);
        font: inherit;
        cursor: pointer;
      }

      .binagotchy-modal-reset svg {
        width: 15px;
        height: 15px;
        display: block;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .binagotchy-modal-reset:disabled {
        color: var(--text-3);
        cursor: default;
        opacity: 0.45;
      }

      .binagotchy-modal-reset:not(:disabled):hover,
      .binagotchy-modal-reset:not(:disabled):focus-visible,
      .binagotchy-modal-close:hover,
      .binagotchy-modal-close:focus-visible {
        background: var(--panel-2);
        color: var(--text);
        outline: none;
      }

      .binagotchy-modal-body {
        display: grid;
        padding: 14px;
      }

      .binagotchy-browser-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
        gap: 10px;
        max-height: min(590px, calc(100vh - 150px));
        overflow: auto;
      }

      .binagotchy-browser-card {
        position: relative;
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
        align-content: start;
      }

      .binagotchy-browser-card.is-partner {
        border-color: rgba(255, 255, 255, 0.28);
        background: rgba(255, 255, 255, 0.03);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      }

      .binagotchy-browser-art {
        min-width: 0;
        min-height: 0;
        display: grid;
        place-items: center;
        aspect-ratio: 1 / 1;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #242323;
        overflow: hidden;
      }

      .binagotchy-browser-actions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }

      .binagotchy-browser-action {
        position: relative;
        width: 100%;
        height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        background: rgba(26, 25, 25, 0.92);
        color: var(--text-2);
        cursor: pointer;
        text-decoration: none;
      }

      .binagotchy-browser-action svg {
        width: 14px;
        height: 14px;
        display: block;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .binagotchy-browser-action.is-active {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.28);
        background: var(--panel-2);
      }

      .binagotchy-browser-action::after {
        content: attr(data-tooltip);
        position: absolute;
        right: 0;
        bottom: calc(100% + 6px);
        padding: 5px 7px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        background: rgba(26, 25, 25, 0.96);
        color: var(--text-2);
        font-size: 10px;
        line-height: 1.2;
        white-space: nowrap;
        opacity: 0;
        transform: translateY(4px);
        pointer-events: none;
        transition:
          opacity 0.12s ease,
          transform 0.12s ease;
      }

      .binagotchy-browser-action:hover::after,
      .binagotchy-browser-action:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }

      .binagotchy-browser-art img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .binagotchy-browser-seed {
        min-width: 0;
        color: var(--text-2);
        font:
          11px/1.35 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        overflow: hidden;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .binagotchy-notice-root {
        position: absolute;
        inset: 0;
        z-index: 4;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(12, 12, 14, 0.58);
        backdrop-filter: blur(2px);
      }

      .binagotchy-notice-root.is-open {
        display: flex;
      }

      .binagotchy-notice {
        width: min(100%, 360px);
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        background: linear-gradient(180deg, #353332 0%, #2f2d2c 100%);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
      }

      .binagotchy-notice-title {
        margin: 0;
        color: var(--text-2);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .binagotchy-notice-message {
        color: var(--text-2);
        font-size: 12px;
        line-height: 1.45;
        word-break: break-word;
      }

      .binagotchy-notice-code {
        display: none;
        margin: -2px 0 0;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #242323;
        color: var(--text-2);
        font:
          11px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .binagotchy-notice-code.is-open {
        display: block;
      }

      .binagotchy-notice-actions {
        display: flex;
        justify-content: flex-end;
      }

      .binagotchy-notice-button {
        min-width: 72px;
        height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(26, 25, 25, 0.92);
        color: var(--text-2);
        font: inherit;
        cursor: pointer;
      }

      .instruction-hero {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        cursor: pointer;
        background:
          radial-gradient(
            circle at 50% 0%,
            rgba(2, 133, 255, 0.16),
            transparent 42%
          ),
          linear-gradient(180deg, #1f252c 0%, #1b1f24 100%);
        padding: 18px 12px 12px;
      }

      .instruction-impact-flash {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(250, 250, 250, 0.1),
          transparent 26%
        );
        opacity: 0;
        pointer-events: none;
        animation: instruction-flash-hit 0.14s 0.64s forwards;
      }

      @keyframes instruction-flash-hit {
        0% {
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      .instruction-scene {
        --instruction-sz: 9px;
        --instruction-cat-wrap-width: calc(var(--instruction-sz) * 16);
        --instruction-cat-wrap-height: calc(var(--instruction-sz) * 16);
        --instruction-scene-min-height: 246px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        min-height: var(--instruction-scene-min-height);
      }

      .instruction-scene.instruction-is-shaking {
        animation: instruction-scene-shake 0.22s 0.64s;
      }

      @keyframes instruction-scene-shake {
        0% {
          transform: translate(0, 0);
        }
        25% {
          transform: translate(-3px, 2px);
        }
        50% {
          transform: translate(3px, -2px);
        }
        75% {
          transform: translate(-1px, 1px);
        }
        100% {
          transform: translate(0, 0);
        }
      }

      .instruction-cat-wrap {
        position: relative;
        width: var(--instruction-cat-wrap-width);
        height: var(--instruction-cat-wrap-height);
        transform-origin: bottom center;
        opacity: 0;
        animation: instruction-stomp 1.2s cubic-bezier(0.6, 0.04, 0.98, 0.33)
          forwards;
        z-index: 3;
      }

      @keyframes instruction-stomp {
        0% {
          transform: translateY(-1000px);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        45% {
          transform: translateY(0) scaleY(1);
        }
        50% {
          transform: translateY(0) scaleY(0.4) scaleX(1.3);
        }
        65% {
          transform: translateY(-48px) scaleY(1.1) scaleX(0.9);
        }
        80% {
          transform: translateY(0) scaleY(0.8) scaleX(1.1);
        }
        100% {
          transform: translateY(0) scaleY(1) scaleX(1);
          opacity: 1;
        }
      }

      .instruction-grid {
        --instruction-pixel: calc(var(--instruction-sz) * 0.5);
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: calc(var(--instruction-grid-w) * var(--instruction-pixel));
        height: calc(var(--instruction-grid-h) * var(--instruction-pixel));
      }

      .instruction-pixel {
        position: absolute;
        left: calc(var(--instruction-pixel) * var(--x));
        top: calc(var(--instruction-pixel) * var(--y));
        width: calc(var(--instruction-pixel) * var(--w));
        height: var(--instruction-pixel);
        background: var(--instruction-color);
      }

      .instruction-dust-container {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .instruction-dust {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: var(--instruction-sz);
        height: var(--instruction-sz);
        margin-left: calc(var(--instruction-sz) * -0.5);
        background: #728292;
        opacity: 0;
        animation: instruction-dust-burst 0.68s 0.6s forwards;
        transform: translate(0, 0);
      }

      @keyframes instruction-dust-burst {
        0% {
          opacity: 0.9;
          transform: translate(0, 0);
        }
        100% {
          opacity: 0;
          transform: translate(var(--dx), var(--dy));
        }
      }

      .instruction-table {
        width: calc(var(--instruction-sz) * 24);
        height: calc(var(--instruction-sz) * 2.5);
        margin-top: calc(var(--instruction-sz) * -1);
        background: #2d3436;
        box-shadow: 0 calc(var(--instruction-sz) * 1) 0 #1a1e1f;
        position: relative;
        z-index: 2;
        animation: instruction-table-impact 0.4s 0.6s ease-out forwards;
      }

      @keyframes instruction-table-impact {
        0% {
          transform: scaleY(1);
        }
        30% {
          transform: scaleY(0.5) translateY(15px);
        }
        100% {
          transform: scaleY(1) translateY(0);
        }
      }

      .instruction-table-leg {
        position: absolute;
        top: 100%;
        width: calc(var(--instruction-sz) * 2);
        height: calc(var(--instruction-sz) * 7);
        background: #2d3436;
        transform-origin: top center;
        animation: instruction-leg-impact 0.4s 0.6s forwards;
      }

      @keyframes instruction-leg-impact {
        0% {
          transform: scaleY(1);
        }
        30% {
          transform: scaleY(0.8);
        }
        100% {
          transform: scaleY(1);
        }
      }

      .instruction-logo-wrapper {
        margin-top: 58px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        min-height: 62px;
      }

      .instruction-word {
        font:
          italic 700 42px/1 "Arial Black",
          "Segoe UI Black",
          sans-serif;
        letter-spacing: 6px;
        position: relative;
      }

      .instruction-word-cat {
        min-width: 3.2ch;
        display: inline-flex;
        justify-content: center;
        margin-right: 8px;
        overflow: visible;
        position: relative;
      }

      .instruction-word-layer {
        display: inline-flex;
        align-items: flex-end;
        gap: 2px;
      }

      .instruction-glyph {
        display: block;
      }

      .instruction-word-label {
        display: inline-flex;
        position: relative;
        color: #d9f5ff;
        opacity: 0;
        transform-origin: center center;
        will-change: transform, gap, opacity;
        text-shadow:
          0 0 8px rgba(217, 245, 255, 0.82),
          0 0 18px rgba(143, 216, 255, 0.58),
          0 0 28px rgba(30, 167, 255, 0.38);
        animation:
          instruction-cat-shrink 1s cubic-bezier(0.22, 0.82, 0.24, 1) forwards,
          instruction-gx-glitch 3s 2s infinite;
      }

      .instruction-word-label-trail {
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        pointer-events: none;
      }

      .instruction-word-label-trail-red {
        color: rgba(30, 167, 255, 0.34);
        text-shadow:
          0 0 12px rgba(30, 167, 255, 0.62),
          0 0 28px rgba(30, 167, 255, 0.32);
        animation: instruction-cat-trail-red 0.96s
          cubic-bezier(0.22, 0.82, 0.24, 1) forwards;
      }

      .instruction-word-label-trail-white {
        color: rgba(217, 245, 255, 0.24);
        text-shadow:
          0 0 16px rgba(217, 245, 255, 0.56),
          0 0 30px rgba(143, 216, 255, 0.22);
        animation: instruction-cat-trail-white 0.92s
          cubic-bezier(0.22, 0.82, 0.24, 1) forwards;
      }

      .instruction-word-desk {
        color: #a7bed6;
        opacity: 0;
        text-shadow:
          0 0 10px rgba(167, 190, 214, 0.18),
          0 0 20px rgba(143, 216, 255, 0.06);
        animation: instruction-desk-appear 0.26s 0.86s
          cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      @keyframes instruction-desk-appear {
        0% {
          opacity: 0;
          transform: translateX(14px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes instruction-cat-shrink {
        0% {
          opacity: 0;
          transform: scale(3.2) translateY(1px);
          gap: 3px;
        }
        10% {
          opacity: 1;
          transform: scale(3.02) translateY(0.5px);
          gap: 4px;
        }
        26% {
          opacity: 1;
          transform: scale(3.1) translateY(-0.5px);
          gap: 6px;
        }
        42% {
          opacity: 1;
          transform: scale(2.92) translateY(0.6px);
          gap: 8px;
        }
        58% {
          opacity: 1;
          transform: scale(3) translateY(-0.4px);
          gap: 10px;
        }
        70% {
          opacity: 1;
          transform: scale(2.5) translateY(0);
          gap: 11px;
        }
        80% {
          opacity: 1;

      .token-line {

      .token-line.value-preview {

      .token-line.value-preview::before {

        );

      .token-line.value-preview.is-rolling::before,

      .token-line.value-preview .token-key,
      .token-line.value-preview .token-value-wrap {

      .token-value-wrap {
        display: inline-grid;
        align-items: center;
        justify-items: end;
        min-width: 0;
      }

      .token-value-text,
      .token-value-ghost {
        grid-area: 1 / 1;

      .token-value-text {

      .token-line.value-preview.is-rolling .token-value-text {

      .token-line.value-preview.is-rolling .token-value-ghost {

      .token-line.value-preview.is-locking .token-value-text {

      .token-value-impact {
        position: absolute;

      @keyframes token-roll-jitter {

          transform: translateX(-0.5px) scale(1);

          transform: translateX(0.75px) scale(1.01);
        }
        50% {

      @keyframes token-roll-ghost-jitter {
        0% {

      @keyframes token-roll-impact {

      @keyframes completion-sheen {

      @keyframes completion-border {

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var view = null;

        var tokenRollState = {
          signature: "",
          rafId: 0,
          timers: [],
          mode: "",
        };

        var instructionMascotState = {
          timerId: 0,
        };

        var binagotchyBrowserBindingsBound = false;
        var agentsFanBindingsBound = false;
        var tokenLayoutFanBindingsBound = false;
        var showDetailFanBindingsBound = false;

        var MASCOT_ALPHABET =
          ".0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-_";
        var FINAL_SUMMARY_TEMPLATE_URI =
          "ui://widget/catdesk-dashboard-final-summary.html";
        var WIDGET_RESOURCE_URI = "__catdeskWidgetResourceUriPlaceholder__";
        var INITIAL_TOKEN_STATS_LAYOUT =
          "__catdeskInitialTokenStatsLayoutPlaceholder__";
        var INITIAL_TOOL_NAME = "__catdeskInitialToolNamePlaceholder__";
        var WIDGET_PAYLOAD_META_KEY = "catdesk/widgetPayload";
        var TOKEN_STATS_LAYOUT_STORAGE_KEY = "catdesk.tokenStatsLayout";
        var tokenStatsLayoutSetting = initialTokenStatsLayout();

        function esc(value) {
          return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function asString(value, fallback) {
          if (typeof value === "string" && value.trim().length > 0)
            return value;
          return fallback;
        }

        function asBool(value, fallback) {
          if (typeof value === "boolean") return value;
          return fallback;
        }

        function asArray(value) {
          return Array.isArray(value) ? value : [];
        }

        function isPlainObject(value) {
          return !!value && typeof value === "object" && !Array.isArray(value);
        }

        function cloneJsonValue(value) {
          return JSON.parse(JSON.stringify(value));
        }

        function readString(value) {
          return typeof value === "string" ? value : null;
        }

        function readNonEmptyString(value) {
          return typeof value === "string" && value.length > 0 ? value : null;
        }

        function readBoolean(value) {
          return typeof value === "boolean" ? value : null;
        }

        function readInteger(value) {
          return typeof value === "number" && Number.isInteger(value)
            ? value
            : null;
        }

        function readNonNegativeInteger(value) {
          var intValue = readInteger(value);
          return intValue !== null && intValue >= 0 ? intValue : null;
        }

        function readPositiveInteger(value) {
          var intValue = readInteger(value);
          return intValue !== null && intValue > 0 ? intValue : null;
        }

        function readOptionalStringField(entry, key) {
          if (!Object.prototype.hasOwnProperty.call(entry, key)) return "";
          return readString(entry[key]);
        }

        function validateArrayEntries(value, validator) {
          if (!Array.isArray(value)) return null;
          return value.reduce(function (items, entry) {
            if (items === null) return null;
            var nextEntry = validator(entry);
            if (nextEntry === null) return null;
            items.push(nextEntry);
            return items;
          }, []);
        }

        function validateStringArray(value, allowEmpty) {
          return validateArrayEntries(value, function (entry) {
            var text = readString(entry);
            if (text === null) return null;
            if (!allowEmpty && text.length === 0) return null;
            return text;
          });
        }

        function validateFileStatus(value) {
          return value === "added" || value === "deleted" || value === "modified"
            ? value
            : null;
        }

        function validateAgentsPathMode(value) {
          return value === "default" ||
            value === "workspace" ||
            value === "catdesk" ||
            value === "codex" ||
            value === "disabled"
            ? value
            : null;
        }

        function validateTokenStatsLayout(value) {
          return value === "disable" || value === "right" || value === "bottom"
            ? value
            : null;
        }

        function validateShowDetailMode(value) {
          return value === "disable" ||
            value === "expanded" ||
            value === "collapsed"
            ? value
            : null;
        }

        function showDetailModeLabel(mode) {
          if (mode === "disable") return "Disable";
          if (mode === "collapsed") return "Collapsed";
          if (mode === "expanded") return "Expanded";
          return "";
        }

        function readStoredTokenStatsLayout() {
          try {
            return validateTokenStatsLayout(
              window.localStorage.getItem(TOKEN_STATS_LAYOUT_STORAGE_KEY),
            );
          } catch (_error) {
            return null;
          }
        }

        function writeStoredTokenStatsLayout(layout) {
          try {
            window.localStorage.setItem(TOKEN_STATS_LAYOUT_STORAGE_KEY, layout);
          } catch (_error) {}
        }

        function initialTokenStatsLayout() {
          var storedLayout = readStoredTokenStatsLayout();
          if (storedLayout !== null) return storedLayout;
          var initialLayout = validateTokenStatsLayout(
            INITIAL_TOKEN_STATS_LAYOUT,
          );
          return initialLayout === null ? "right" : initialLayout;
        }

        function setTokenStatsLayoutSetting(layout) {
          var nextLayout = validateTokenStatsLayout(layout);
          if (nextLayout === null) return false;
          tokenStatsLayoutSetting = nextLayout;
          writeStoredTokenStatsLayout(nextLayout);
          return true;
        }

        function currentLoadingTokenStatsLayout() {
          var storedLayout = readStoredTokenStatsLayout();
          return storedLayout === null ? tokenStatsLayoutSetting : storedLayout;
        }

        function tokenStatsLayoutClassName(layout) {
          return layout === "bottom"
            ? " token-layout-bottom"
            : " token-layout-right";
        }

        function validateMascotFrame(value) {
          return readNonEmptyString(value);
        }

        function validateMascotSequenceStep(value) {
          if (!isPlainObject(value)) return null;
          var frame = readNonNegativeInteger(value.frame);
          var repeat = readPositiveInteger(value.repeat);
          if (frame === null || repeat === null) return null;
          return {
            frame: frame,
            repeat: repeat,
          };
        }

        function validateFile(entry) {
          if (!isPlainObject(entry)) return null;
          var path = readNonEmptyString(entry.path);
          var status = validateFileStatus(entry.status);
          var added = readNonNegativeInteger(entry.added);
          var removed = readNonNegativeInteger(entry.removed);
          var diff = readString(entry.diff);
          if (
            path === null ||
            status === null ||
            added === null ||
            removed === null ||
            diff === null
          ) {
            return null;
          }
          return {
            path: path,
            status: status,
            added: added,
            removed: removed,
            diff: diff,
          };
        }

        function validateListEntry(entry) {
          if (!isPlainObject(entry)) return null;
          var path = readNonEmptyString(entry.path);
          var name = readNonEmptyString(entry.name);
          var kind = readString(entry.kind);
          var depth = readNonNegativeInteger(entry.depth);
          if (path === null || name === null || depth === null) return null;
          if (kind !== "dir" && kind !== "file" && kind !== "other") {
            return null;
          }
          return {
            path: path,
            name: name,
            kind: kind,
            depth: depth,
          };
        }

        function validateTurnTokenUsage(entry) {
          if (!isPlainObject(entry)) return null;
          var inputTokens = readNonNegativeInteger(entry.inputTokens);
          var outputTokens = readNonNegativeInteger(entry.outputTokens);
          var totalTokens = readNonNegativeInteger(entry.totalTokens);
          if (
            inputTokens === null ||
            outputTokens === null ||
            totalTokens === null
          ) {
            return null;
          }
          return {
            inputTokens: inputTokens,
            outputTokens: outputTokens,
            totalTokens: totalTokens,
          };
        }

        function validateBinagotchyCard(entry) {
          if (!isPlainObject(entry)) return null;
          var folder = readNonEmptyString(entry.folder);
          var seed = readNonEmptyString(entry.seed);
          var image = readNonEmptyString(entry.image);
          var saveFolderUrl = readOptionalStringField(entry, "saveFolderUrl");
          var setPartnerUrl = readOptionalStringField(entry, "setPartnerUrl");
          var isPartner = readBoolean(entry.isPartner);
          if (
            folder === null ||
            seed === null ||
            image === null ||
            saveFolderUrl === null ||
            setPartnerUrl === null ||
            isPartner === null
          ) {
            return null;
          }
          return {
            folder: folder,
            seed: seed,
            image: image,
            saveFolderUrl: saveFolderUrl,
            setPartnerUrl: setPartnerUrl,
            isPartner: isPartner,
          };
        }

        function emptyMascotState() {
          return {
            mascotWidth: 0,
            mascotHeight: 0,
            mascotFrameMs: 50,
            mascotSpiritHeroBackground: "",
            mascotPalette: [],
            mascotFrames: [],
            mascotSequence: [],
          };
        }

        function validateMascotState(mascot) {
          if (!isPlainObject(mascot)) return null;
          var width = readPositiveInteger(mascot.width);
          var height = readPositiveInteger(mascot.height);
          var frameMs = readPositiveInteger(mascot.frameMs);
          var spiritHeroBackground = readString(mascot.spiritHeroBackground);
          var palette = validateStringArray(mascot.palette, false);
          var frames = validateArrayEntries(mascot.frames, validateMascotFrame);
          var sequence = validateArrayEntries(
            mascot.sequence,

              while (x + runWidth < width) {

                  x +
                  ";" +
                  "--y:" +
                  y +
                  ";" +
                  "--w:" +
                  runWidth +

                  "--instruction-color:" +
                  esc(color) +

              x += runWidth;

        function startInstructionMascotAnimation(hero, current) {
          var grid = hero.querySelector(".instruction-grid");
          if (!grid) return;
          stopInstructionMascotAnimation();
          var frames = current.mascotFrames;
          var sequence = current.mascotSequence;
          var frameMs = current.mascotFrameMs || 50;
          if (
            !Array.isArray(frames) ||
            frames.length === 0 ||
            !Array.isArray(sequence) ||
            sequence.length === 0
          ) {
            grid.innerHTML = "";
            return;
          }
          var stepIndex = 0;

          function applyStep() {
            var step = sequence[stepIndex];
            var frame = frames[step.frame] || frames[0] || "";
            grid.innerHTML = renderInstructionMascotFrame(current, frame);
            stepIndex = (stepIndex + 1) % sequence.length;
            instructionMascotState.timerId = window.setTimeout(
              applyStep,
              Math.max(1, step.repeat) * frameMs,
            );
          }

          applyStep();
        }

        function bindInstructionReplay(hero, current) {
          if (!hero) return;
          startInstructionMascotAnimation(hero, current);
          hero.addEventListener("click", function () {
            stopInstructionMascotAnimation();
            var replacement = hero.cloneNode(true);
            hero.replaceWith(replacement);
            bindInstructionReplay(replacement, current);
          });
        }

        function openBinagotchyBrowser() {
          var modal = document.getElementById("binagotchy-browser-modal");
          if (!modal) return;
          modal.classList.add("is-open");
          modal.setAttribute("aria-hidden", "false");
          closeBinagotchyNotice();
        }

        function closeBinagotchyBrowser() {
          var modal = document.getElementById("binagotchy-browser-modal");
          if (!modal) return;
          modal.classList.remove("is-open");
          modal.setAttribute("aria-hidden", "true");
          closeBinagotchyNotice();
        }

        function isBinagotchyNoticeOpen() {
          var noticeRoot = document.getElementById("binagotchy-notice-root");
          return !!(noticeRoot && noticeRoot.classList.contains("is-open"));
        }

        function openBinagotchyNotice(title, message, isError, codeValue) {
          var noticeRoot = document.getElementById("binagotchy-notice-root");
          var titleNode = document.getElementById("binagotchy-notice-title");
          var messageNode = document.getElementById(
            "binagotchy-notice-message",
          );
          var codeNode = document.getElementById("binagotchy-notice-code");
          var okButton = document.querySelector(
            "[data-close-binagotchy-notice]",
          );
          if (!noticeRoot || !titleNode || !messageNode || !codeNode) return;
          titleNode.textContent = title || "Notice";
          messageNode.textContent = message || "";
          messageNode.classList.toggle("is-error", !!isError);
          codeNode.textContent = codeValue || "";
          codeNode.classList.toggle("is-open", !!codeValue);
          noticeRoot.classList.add("is-open");
          noticeRoot.setAttribute("aria-hidden", "false");
          if (okButton) okButton.focus();
        }

        function closeBinagotchyNotice() {
          var noticeRoot = document.getElementById("binagotchy-notice-root");
          var messageNode = document.getElementById(
            "binagotchy-notice-message",
          );
          var codeNode = document.getElementById("binagotchy-notice-code");
          if (!noticeRoot || !messageNode || !codeNode) return;
          noticeRoot.classList.remove("is-open");
          noticeRoot.setAttribute("aria-hidden", "true");
          messageNode.textContent = "";
          messageNode.classList.remove("is-error");
          codeNode.textContent = "";
          codeNode.classList.remove("is-open");
        }

        function syncAgentsPathState(payload) {
          if (!payload || !isPlainObject(payload)) return false;
          var agentsPathMode = validateAgentsPathMode(payload.agentsPathMode);
          var agentsPath = readNonEmptyString(payload.agentsPath);
          var agentsPathDisplay = readNonEmptyString(payload.agentsPathDisplay);
          var agentsWorkspacePath = readNonEmptyString(payload.agentsWorkspacePath);
          var agentsWorkspacePathDisplay = readNonEmptyString(
            payload.agentsWorkspacePathDisplay,
          );
          var agentsWorkspaceAvailable = readBoolean(
            payload.agentsWorkspaceAvailable,
          );
          var agentsCatdeskPath = readNonEmptyString(payload.agentsCatdeskPath);
          var agentsCatdeskPathDisplay = readNonEmptyString(
            payload.agentsCatdeskPathDisplay,
          );
          var agentsCatdeskAvailable = readBoolean(payload.agentsCatdeskAvailable);
          var agentsCodexPath = readNonEmptyString(payload.agentsCodexPath);
          var agentsCodexPathDisplay = readNonEmptyString(
            payload.agentsCodexPathDisplay,
          );
          var agentsCodexAvailable = readBoolean(payload.agentsCodexAvailable);
          if (
            !view ||
            agentsPathMode === null ||
            agentsPath === null ||
            agentsPathDisplay === null ||
            agentsWorkspacePath === null ||
            agentsWorkspacePathDisplay === null ||
            agentsWorkspaceAvailable === null ||
            agentsCatdeskPath === null ||
            agentsCatdeskPathDisplay === null ||
            agentsCatdeskAvailable === null ||
            agentsCodexPath === null ||
            agentsCodexPathDisplay === null ||
            agentsCodexAvailable === null
          ) {
            return false;
          }
          view.agentsPathMode = agentsPathMode;
          view.agentsPath = agentsPath;
          view.agentsPathDisplay = agentsPathDisplay;
          view.agentsWorkspacePath = agentsWorkspacePath;
          view.agentsWorkspacePathDisplay = agentsWorkspacePathDisplay;
          view.agentsWorkspaceAvailable = agentsWorkspaceAvailable;
          view.agentsCatdeskPath = agentsCatdeskPath;
          view.agentsCatdeskPathDisplay = agentsCatdeskPathDisplay;
          view.agentsCatdeskAvailable = agentsCatdeskAvailable;
          view.agentsCodexPath = agentsCodexPath;
          view.agentsCodexPathDisplay = agentsCodexPathDisplay;
          view.agentsCodexAvailable = agentsCodexAvailable;
          return true;
        }

          var hintNode = fanRoot && fanRoot.querySelector("[data-agents-fan-hint]");
          if (!hintNode) return;

          hintNode.hidden = true;

        function clearAgentsFanTimers(fanRoot) {
          if (!fanRoot) return;
          if (fanRoot._agentsFanHideTimer) {
            window.clearTimeout(fanRoot._agentsFanHideTimer);
            fanRoot._agentsFanHideTimer = null;
          }
          if (fanRoot._agentsFanOpenFrame) {
            window.cancelAnimationFrame(fanRoot._agentsFanOpenFrame);
            fanRoot._agentsFanOpenFrame = null;
          }
        }

        function positionAgentsFanOverlay(fanRoot) {
          if (!fanRoot) return;
          var menu = fanRoot.querySelector("[data-agents-fan-menu]");
          if (!menu) return;
          var fanRect = fanRoot.getBoundingClientRect();
          menu.style.left = Math.round(fanRect.left - 9) + "px";
          menu.style.top =
            Math.round(fanRect.top + fanRect.height / 2) + "px";
        }

        function openAgentsFan(fanRoot) {
          if (!fanRoot) return;
          var trigger = fanRoot.querySelector("[data-agents-fan-trigger]");
          var menu = fanRoot.querySelector("[data-agents-fan-menu]");
          if (!trigger || !menu) return;
          closeAgentsFans(fanRoot);
          closeTokenLayoutFans(null);
          closeShowDetailFans(null);
          clearAgentsFanTimers(fanRoot);
          positionAgentsFanOverlay(fanRoot);
          menu.hidden = false;
          menu.setAttribute("aria-hidden", "false");
          fanRoot.classList.remove("is-open");
          trigger.classList.remove("is-open");
          void menu.offsetWidth;
          fanRoot._agentsFanOpenFrame = window.requestAnimationFrame(function () {
            fanRoot._agentsFanOpenFrame = null;
            fanRoot.classList.add("is-open");
            trigger.classList.add("is-open");
          });
        }

        function updateAgentsPathDisplayDom(fanRoot) {
          if (!fanRoot || !view) return;
          var combo = fanRoot.closest(".instruction-path-combo");
          if (!combo) return;
          var codeNode = combo.querySelector(".instruction-path-code");
          if (!codeNode) return;
          codeNode.textContent = view.agentsPathDisplay || "-";
          if (view.agentsPath && view.agentsPath !== "-") {
            codeNode.setAttribute("title", view.agentsPath);
          } else {
            codeNode.removeAttribute("title");
          }
        }

        function syncAgentsFanDom(fanRoot) {
          if (!fanRoot || !view) return;
          fanRoot.setAttribute("data-agents-selected", view.agentsPathMode);
          updateAgentsPathDisplayDom(fanRoot);

          Array.prototype.forEach.call(
            fanRoot.querySelectorAll("[data-agents-option]"),
            function (node) {
              var option = node.getAttribute("data-agents-option") || "";
              var isDisabled = false;
              var hintText = "";
              var ariaLabel = "";

              if (option === "default") {
                hintText = "Auto resolve";
                ariaLabel = "Use automatic resolution";
              } else if (option === "disabled") {
                hintText = "Disable";
                ariaLabel = "Disable";
              } else if (option === "workspace") {

            document.querySelectorAll("[data-binagotchy-card-seed]"),
            function (cardNode) {
              var cardSeed = cardNode.getAttribute("data-binagotchy-card-seed");
              var isPartner = cardSeed === seed;
              cardNode.classList.toggle("is-partner", isPartner);
              var button = cardNode.querySelector("[data-set-partner-seed]");
              if (!button) return;
              button.classList.toggle("is-active", isPartner);
              button.setAttribute(
                "data-tooltip",
                isPartner ? "Current partner" : "Set as partner",
              );
              button.setAttribute(
                "aria-label",
                isPartner ? "Current partner" : "Set as partner",
              );
            },
          );
        }

        function submitBinagotchyPartner(button) {
          if (!button) return;
          var seed = button.getAttribute("data-set-partner-seed") || "";
          var url = button.getAttribute("data-set-partner-url") || "";
          if (!seed || !url) return;
          button.disabled = true;
          window
            .fetch(url, {
              method: "POST",
              headers: {
                "Content-Type":
                  "application/x-www-form-urlencoded;charset=UTF-8",
                "ngrok-skip-browser-warning": "1",
              },
              body: "seed=" + encodeURIComponent(seed),
            })
            .then(function (response) {
              if (!response.ok) {
                throw new Error("Failed to set Binagotchy partner");
              }
              return response.json();
            })
            .then(function (payload) {
              if (!payload || payload.ok !== true) {
                throw new Error("Failed to set Binagotchy partner");
              }
              syncBinagotchyPartnerSelection(seed);
              applyWidgetMascotToView(payload.widgetMascot);
              render();
              openBinagotchyBrowser();
            })
            .catch(function (error) {
              console.error(error);
              openBinagotchyNotice(
                "Failed to set partner",
                error && error.message
                  ? error.message
                  : "Failed to set partner",
                true,
              );
            })
            .finally(function () {
              button.disabled = false;
            });
        }

        function resetBinagotchyPartner(button) {
          if (!button) return;
          var url = button.getAttribute("data-reset-binagotchy-partner-url") || "";
          if (!url) return;
          button.disabled = true;
          closeBinagotchyNotice();
          window
            .fetch(url, {
              method: "DELETE",
              headers: {
                "ngrok-skip-browser-warning": "1",
              },
            })
            .then(function (response) {
              if (!response.ok) {
                throw new Error("Failed to reset Binagotchy partner");
              }
              return response.json();
            })
            .then(function (payload) {
              if (!payload || payload.ok !== true) {
                throw new Error("Failed to reset Binagotchy partner");
              }
              syncBinagotchyPartnerSelection("");
              applyWidgetMascotToView(payload.widgetMascot);
              render();
              openBinagotchyBrowser();
            })
            .catch(function (error) {
              console.error(error);
              openBinagotchyNotice(
                "Failed to reset partner",
                error && error.message
                  ? error.message
                  : "Failed to reset partner",
                true,
              );
            })
            .finally(function () {
              button.disabled = false;
            });

        function saveBinagotchyFolder(button) {
          if (!button) return;
          var url = button.getAttribute("data-save-folder-url") || "";
          var folderName = button.getAttribute("data-save-folder-name") || "";
          if (!url) return;
          button.disabled = true;
          closeBinagotchyNotice();
          window
            .fetch(url, {
              method: "POST",
              headers: {
                "ngrok-skip-browser-warning": "1",
              },
            })
            .then(function (response) {
              if (!response.ok) {
                return response
                  .json()
                  .catch(function () {
                    return null;
                  })
                  .then(function (payload) {
                    var message =
                      payload && payload.error
                        ? String(payload.error)

              }
              return response.json();

            .then(function (payload) {

              openBinagotchyNotice(

                true,

              button.disabled = false;

        var GPT55_INPUT_USD_PER_1M = 5.0;
        var GPT55_OUTPUT_USD_PER_1M = 30.0;
        var PRICE_ANIMATION_DECIMALS = 6;

        function estimateGpt55TurnCostUsd(usage) {
          if (!usage) return 0;
          var input = Number(usage.inputTokens);
          var output = Number(usage.outputTokens);
          if (!Number.isFinite(input) || input < 0) input = 0;
          if (!Number.isFinite(output) || output < 0) output = 0;
          return (
            (input * GPT55_OUTPUT_USD_PER_1M +
              output * GPT55_INPUT_USD_PER_1M) /
            1000000
          );
        }

        function formatUsdAnimated(usd) {
          if (!Number.isFinite(usd) || usd <= 0)
            return "0." + "0".repeat(PRICE_ANIMATION_DECIMALS);
          return usd.toFixed(PRICE_ANIMATION_DECIMALS);
        }

        function formatUsdCompact(usd) {
          return formatUsdAnimated(usd).replace(/\.?0+$/, "");
        }

        function formatTokenNumber(value) {
          return Number(value).toLocaleString("en-US");
        }

        function formatTokenCompact(value) {
          var number = Number(value);
          if (!Number.isFinite(number)) return "0";
          var abs = Math.abs(number);
          if (abs < 1000) return formatTokenNumber(number);
          var units = [
            { value: 1000000000, suffix: "B" },
            { value: 1000000, suffix: "M" },
            { value: 1000, suffix: "K" },
          ];
          for (var i = 0; i < units.length; i += 1) {
            var unit = units[i];
            if (abs < unit.value) continue;
            var scaled = number / unit.value;
            var decimals = Math.abs(scaled) >= 100 ? 0 : 1;
            return scaled.toFixed(decimals).replace(/\.0$/, "") + unit.suffix;
          }
          return formatTokenNumber(number);
        }

        function renderTokenLine(kind, valueText, animate) {

        function renderTokenFace(usage, callCount, label, options) {
          options = options || {};
          var faceClass = options.faceClass ? " " + options.faceClass : "";
          var animate = !!options.animate;
          var estimatedUsd = estimateGpt55TurnCostUsd(usage);

                tokenKeySvg("calls") +

            ? formatUsdAnimated(estimatedUsd)

            ? '<div class="token-face-label">' + esc(label) + "</div>"

          return (
            '<div class="token-face' +

            labelHtml +
            renderTokenLine(
              "input",
              formatTokenCompact(usage.inputTokens),

            renderTokenLine(
              "output",
              formatTokenCompact(usage.outputTokens),
              animate,
            ) +
            renderTokenLine(
              "total",
              formatTokenCompact(usage.totalTokens),
              animate,

            renderTokenLine("price", priceText, animate) +

        function renderTurnToken(current) {
          if (!current) return "";
          var tokenStatsLayout = validateTokenStatsLayout(current.tokenStatsLayout);
          if (tokenStatsLayout === "disable") return "";
          if (tokenStatsLayout === null) tokenStatsLayout = "right";
          var sideClass =
            "token-side" +
            (tokenStatsLayout === "bottom" ? " token-side-footer" : "");
          var usage = current.turnTokenUsage || {
            inputTokens: 0,
            outputTokens: 0,
            totalTokens: 0,
          };
          var callCount = Number(current.toolCallCount);
          var historyUsage = current.historyTurnTokenUsage || {
            inputTokens: 0,
            outputTokens: 0,
            totalTokens: 0,
          };
          var historyCallCount = Number(current.historyToolCallCount);
          var currentLabel = "This tool call";
          if (!Number.isFinite(callCount) || callCount < 0) callCount = 0;
          if (!Number.isFinite(historyCallCount) || historyCallCount < 0)
            historyCallCount = 0;
          var hasCurrent =
            (Number.isFinite(usage.totalTokens) && usage.totalTokens > 0) ||
            callCount > 0;
          var hasHistory =
            (Number.isFinite(historyUsage.totalTokens) &&
              historyUsage.totalTokens > 0) ||
            historyCallCount > 0;
          if (!hasCurrent && !hasHistory) return "";
          if (!hasHistory) {
            return (
              '<div class="' +
              sideClass +

              renderTokenFace(usage, callCount, "", {
                faceClass: "token-face-live",

          return (
            '<div class="' +
            sideClass +
            ' token-side-hover" tabindex="0" aria-label="Hover to show historical totals">' +
            renderTokenFace(usage, callCount, currentLabel, {
              faceClass: "token-face-live",
              animate: true,
            }) +
            renderTokenFace(historyUsage, historyCallCount, "History total", {
              faceClass: "token-face-history",
              animate: false,
            }) +
            "</div>"

        function renderToolDetailPanel(current) {
          if (!current || (!current.call && !current.detail)) return "";
          var callHtml = current.call
            ? '<div class="command-line">' + esc(current.call) + "</div>"

          var detailHtml = current.detail
            ? '<pre class="command-output">' + esc(current.detail) + "</pre>"
            : "";
